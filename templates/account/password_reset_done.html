{% extends "base.html" %}

{% block meta_title %}Check Your Email | SportsMode{% endblock %}

{% block content %}
<section class="py-5 bg-light" aria-label="Password reset email sent">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-8 col-md-6 col-lg-5 text-center">

                <i class="bi bi-envelope-check-fill display-3 text-warning d-block mb-3"></i>
                <h1 class="h3 fw-bold mb-2">Check your inbox</h1>
                <p class="text-muted mb-4">
                    We've sent a password reset link to your email address.
                    It may take a few minutes to arrive — also check your spam folder.
                </p>

                <a href="{% url 'account_login' %}" class="btn btn-sport px-5">
                    Back to Log In
                </a>

            </div>
        </div>
    </div>
</section>
{% endblock %}
