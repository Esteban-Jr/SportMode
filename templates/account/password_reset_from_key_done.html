{% extends "base.html" %}

{% block meta_title %}Password Updated | SportsMode{% endblock %}

{% block content %}
<section class="py-5 bg-light" aria-label="Password reset complete">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-8 col-md-6 col-lg-4 text-center">

                <i class="bi bi-check-circle-fill display-3 text-warning d-block mb-3"></i>
                <h1 class="h3 fw-bold mb-2">Password updated</h1>
                <p class="text-muted mb-4">
                    Your password has been changed successfully.
                    You can now log in with your new password.
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-sport btn-lg px-5">
                    Log In <i class="bi bi-box-arrow-in-right ms-1"></i>
                </a>

            </div>
        </div>
    </div>
</section>
{% endblock %}
