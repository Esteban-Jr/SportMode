{% extends "base.html" %}

{% block meta_title %}Server Error | SportsMode{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center text-center py-5">
            <div class="col-md-6">
                <p class="display-1 fw-bold text-warning mb-0">500</p>
                <h1 class="h2 fw-bold mb-3">Something Went Wrong</h1>
                <p class="text-muted mb-4">
                    We're sorry — an unexpected error occurred on our end.
                    Our team has been notified. Please try again in a moment.
                </p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{% url 'home' %}" class="btn btn-sport btn-lg">
                        <i class="bi bi-house me-2"></i>Back to Home
                    </a>
                    <a href="{% url 'contact' %}" class="btn btn-outline-dark btn-lg">
                        <i class="bi bi-headset me-2"></i>Contact Support
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
