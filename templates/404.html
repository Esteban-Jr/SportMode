{% extends "base.html" %}

{% block meta_title %}Page Not Found | SportsMode{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center text-center py-5">
            <div class="col-md-6">
                <p class="display-1 fw-bold text-warning mb-0">404</p>
                <h1 class="h2 fw-bold mb-3">Page Not Found</h1>
                <p class="text-muted mb-4">
                    Sorry, we couldn't find the page you were looking for.
                    It may have been moved, deleted, or the URL might be incorrect.
                </p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{% url 'home' %}" class="btn btn-sport btn-lg">
                        <i class="bi bi-house me-2"></i>Back to Home
                    </a>
                    <a href="{% url 'products:product_list' %}" class="btn btn-outline-dark btn-lg">
                        <i class="bi bi-bag me-2"></i>Shop All Products
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
